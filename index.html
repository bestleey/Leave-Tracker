<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>연차</title>

<style>
body{font-family:-apple-system;background:#f2f2f7;margin:0;padding:16px}

h1{margin-bottom:10px}

.summary{display:flex;gap:10px;margin-bottom:12px}
.box{flex:1;border-radius:12px;padding:10px;text-align:center;color:white}
.green{background:#34c759}
.yellow{background:#ffcc00;color:black}
.red{background:#ff3b30}

.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}

.day{
 background:white;
 border-radius:10px;
 min-height:80px;
 padding:4px;
 position:relative;
}

.sun{background:#ffd6d6;color:#b00000}
.sat{background:#d6e8ff;color:#0047b3}

.bar{position:absolute;bottom:0;height:6px;background:#0a58dc}
.start{left:0;right:50%;border-radius:6px 0 0 6px}
.mid{left:0;right:0}
.end{left:50%;right:0;border-radius:0 6px 6px 0}
.single{left:0;right:0;border-radius:6px}

.half{position:absolute;bottom:0;left:0;width:50%;height:6px;background:#34c759;border-radius:6px}

.memo{font-size:10px;color:#555}
.controls{display:flex;justify-content:space-between;margin-bottom:10px}
button{padding:6px 10px;border:none;background:#0a58dc;color:white;border-radius:8px}
</style>
</head>

<body>

<h1>연차</h1>

<div class="summary">
 <div id="remainBox" class="box">
  남은<br><span id="remain">-</span>
 </div>
 <div class="box" style="background:#999">
  총<br><span id="total">-</span>
 </div>
 <div class="box" style="background:#666">
  사용<br><span id="used">-</span>
 </div>
</div>

<div class="controls">
<button onclick="prev()">◀</button>
<div id="month"></div>
<button onclick="next()">▶</button>
</div>

<div id="calendar" class="calendar"></div>

<script>
const URL="./leave_data.json";
let cur=new Date();

async function load(){
 const res=await fetch(URL+"?v="+Date.now());
 const data=await res.json();
 update(data);
 render(data);
}

function update(data){
 let total=data.settings?.annual_total||0;
 let used=(data.entries||[]).reduce((s,e)=>s+Number(e.days||0),0);
 let remain=total-used;

 document.getElementById("total").innerText=total;
 document.getElementById("used").innerText=used;
 document.getElementById("remain").innerText=remain;

 let box=document.getElementById("remainBox");
 box.className="box";
 if(remain>=10) box.classList.add("green");
 else if(remain>=6) box.classList.add("yellow");
 else box.classList.add("red");
}

function render(data){
 const cal=document.getElementById("calendar");
 cal.innerHTML="";

 let y=cur.getFullYear();
 let m=cur.getMonth();

 document.getElementById("month").innerText=y+"-"+(m+1);

 let first=new Date(y,m,1).getDay();
 let last=new Date(y,m+1,0).getDate();

 const entries=data.entries||[];

 const ranges=new Set();
 entries.forEach(e=>{
   let start=new Date(e.date);
   let days=Math.ceil(e.days||1);
   for(let i=0;i<days;i++){
     let d=new Date(start);
     d.setDate(start.getDate()+i);
     ranges.add(d.toISOString().slice(0,10));
   }
 });

 for(let i=0;i<first;i++) cal.appendChild(document.createElement("div"));

 for(let d=1;d<=last;d++){
  let cell=document.createElement("div");
  cell.className="day";

  let wd=new Date(y,m,d).getDay();
  if(wd===0) cell.classList.add("sun");
  if(wd===6) cell.classList.add("sat");

  let dateStr=y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");

  let entry=entries.find(e=>e.date===dateStr);

  cell.innerHTML=`<b>${d}</b>`+(entry?`<div class="memo">${entry.memo||""}</div>`:"");

  if(entry && entry.days==0.5){
    let half=document.createElement("div");
    half.className="half";
    cell.appendChild(half);
  }

  if(ranges.has(dateStr) && !(entry && entry.days==0.5)){
    let bar=document.createElement("div");

    let prev=new Date(y,m,d-1).toISOString().slice(0,10);
    let next=new Date(y,m,d+1).toISOString().slice(0,10);

    if(ranges.has(prev)&&ranges.has(next)) bar.className="bar mid";
    else if(ranges.has(prev)) bar.className="bar end";
    else if(ranges.has(next)) bar.className="bar start";
    else bar.className="bar single";

    cell.appendChild(bar);
  }

  cal.appendChild(cell);
 }
}

function prev(){cur.setMonth(cur.getMonth()-1);load();}
function next(){cur.setMonth(cur.getMonth()+1);load();}

load();
</script>

</body>
</html>
