<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>연차</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;background:#f2f2f7;margin:0;padding:16px;color:#161618}
h1{margin:0 0 10px}
.summary{display:flex;gap:10px;margin-bottom:12px}
.box{flex:1;border-radius:12px;padding:10px;text-align:center;color:white;font-weight:600}
.green{background:#34c759}
.yellow{background:#ffcc00;color:black}
.red{background:#ff3b30}
.card{background:rgba(255,255,255,0.78);backdrop-filter:blur(12px);border-radius:16px;padding:12px;margin-bottom:12px}
.controls{display:flex;justify-content:space-between;align-items:center}
button{padding:6px 10px;border:none;background:#0a58dc;color:white;border-radius:8px}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.weekday{font-size:11px;text-align:center;color:#666;padding:4px 0}
.day{
  background:#fff;border-radius:10px;padding:6px;min-height:82px;position:relative;
  display:flex;flex-direction:column;justify-content:flex-start;overflow:hidden;
}
.sun{background:#ffd1d1}
.sat{background:#dbe9ff}
.sun .date{color:#b00020}
.sat .date{color:#0059c9}
.date{font-weight:700;font-size:13px;line-height:1.2;margin-bottom:4px}
.memo{font-size:10px;color:#555;line-height:1.2;word-break:break-word;max-height:26px;overflow:hidden}
.start,.mid,.end,.single{
  position:absolute;left:0;right:0;bottom:0;height:6px;background:#0a58dc;
}
.start{border-radius:6px 0 0 6px}
.mid{border-radius:0}
.end{border-radius:0 6px 6px 0}
.single{border-radius:6px}
.half{
  position:absolute;left:0;bottom:0;width:50%;height:6px;background:#34c759;border-radius:6px 0 0 6px;
}
</style>
</head>
<body>

<h1>연차</h1>

<div class="summary">
  <div id="remainBox" class="box">남은<br><span id="remain">-</span></div>
  <div class="box" style="background:#8e8e93">총<br><span id="total">-</span></div>
  <div class="box" style="background:#636366">사용<br><span id="used">-</span></div>
</div>

<div class="card controls">
  <button onclick="prev()">◀</button>
  <div id="month"></div>
  <button onclick="next()">▶</button>
</div>

<div class="calendar" id="weekdayRow"></div>
<div id="calendar" class="calendar"></div>

<script>
const URL = "./leave_data.json";
let cur = new Date();

function fmt(n){
  const v = Number(n || 0);
  return Number.isInteger(v) ? String(v) : String(v).replace(/\.0+$/, "");
}

function parseYMD(ymd){
  const [y,m,d] = String(ymd).split("-").map(Number);
  return { y, m, d };
}

function toYMD(y,m,d){
  return `${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
}

function addDaysLocal(y,m,d,delta){
  const dt = new Date(y, m-1, d);
  dt.setDate(dt.getDate() + delta);
  return {
    y: dt.getFullYear(),
    m: dt.getMonth()+1,
    d: dt.getDate(),
    wd: dt.getDay(),
    ymd: toYMD(dt.getFullYear(), dt.getMonth()+1, dt.getDate())
  };
}

function expandWorkdays(startStr, amount){
  const start = parseYMD(startStr);
  const whole = Math.floor(Number(amount || 0));
  const out = [];
  let cursor = { ...start };
  let used = 0;

  while(used < whole){
    const cur = addDaysLocal(cursor.y, cursor.m, cursor.d, 0);
    if(cur.wd !== 0 && cur.wd !== 6){
      out.push(cur.ymd);
      used++;
    }
    const next = addDaysLocal(cursor.y, cursor.m, cursor.d, 1);
    cursor = { y: next.y, m: next.m, d: next.d };
  }
  return out;
}

async function load(){
  const res = await fetch(URL + "?v=" + Date.now(), { cache: "no-store" });
  const data = await res.json();
  updateSummary(data);
  render(data);
}

function updateSummary(data){
  const total = Number(data.settings?.annual_total || 0);
  const used = (data.entries || []).reduce((s,e) => s + Number(e.days || 0), 0);
  const remain = total - used;

  document.getElementById("total").innerText = fmt(total);
  document.getElementById("used").innerText = fmt(used);
  document.getElementById("remain").innerText = fmt(remain);

  const box = document.getElementById("remainBox");
  box.className = "box";
  if(remain >= 10) box.classList.add("green");
  else if(remain >= 6) box.classList.add("yellow");
  else box.classList.add("red");
}

function render(data){
  const cal = document.getElementById("calendar");
  const weekdayRow = document.getElementById("weekdayRow");
  cal.innerHTML = "";
  weekdayRow.innerHTML = "";

  ["일","월","화","수","목","금","토"].forEach((w, idx) => {
    const div = document.createElement("div");
    div.className = "weekday";
    div.textContent = w;
    if(idx === 0) div.style.color = "#b00020";
    if(idx === 6) div.style.color = "#0059c9";
    weekdayRow.appendChild(div);
  });

  const y = cur.getFullYear();
  const m = cur.getMonth() + 1;
  document.getElementById("month").innerText = `${y}-${String(m).padStart(2,"0")}`;

  const firstWday = new Date(y, m-1, 1).getDay();
  const last = new Date(y, m, 0).getDate();
  const entries = Array.isArray(data.entries) ? data.entries : [];

  const halfEntryMap = new Map();
  const fullEntryMap = new Map();

  for(const e of entries){
    const days = Number(e.days || 0);
    if(days === 0.5){
      halfEntryMap.set(String(e.date), e);
    } else if(days >= 1){
      const expanded = expandWorkdays(String(e.date), days);
      for(const day of expanded){
        fullEntryMap.set(day, e);
      }
    }
  }

  for(let i=0; i<firstWday; i++){
    cal.appendChild(document.createElement("div"));
  }

  for(let d=1; d<=last; d++){
    const cell = document.createElement("div");
    cell.className = "day";

    const wd = new Date(y, m-1, d).getDay();
    if(wd === 0) cell.classList.add("sun");
    if(wd === 6) cell.classList.add("sat");

    const dateStr = toYMD(y, m, d);
    const halfEntry = halfEntryMap.get(dateStr);
    const fullEntry = fullEntryMap.get(dateStr);

    const memoSource = halfEntry || fullEntry;
    cell.innerHTML = `<div class="date">${d}</div>` + (memoSource ? `<div class="memo">${memoSource.memo || ""}</div>` : "");

    if(halfEntry){
      const half = document.createElement("div");
      half.className = "half";
      cell.appendChild(half);
    } else if(fullEntry){
      const prev = addDaysLocal(y, m, d, -1).ymd;
      const next = addDaysLocal(y, m, d, 1).ymd;
      const prevHas = fullEntryMap.has(prev);
      const nextHas = fullEntryMap.has(next);

      const bar = document.createElement("div");
      if(prevHas && nextHas) bar.className = "mid";
      else if(prevHas) bar.className = "end";
      else if(nextHas) bar.className = "start";
      else bar.className = "single";
      cell.appendChild(bar);
    }

    cal.appendChild(cell);
  }
}

function prev(){ cur.setMonth(cur.getMonth() - 1); load(); }
function next(){ cur.setMonth(cur.getMonth() + 1); load(); }

load();
</script>

</body>
</html>
