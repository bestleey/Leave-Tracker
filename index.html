<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>연차 앱 Final</title>

<style>
body{font-family:-apple-system;background:#f2f2f7;margin:0;padding:16px;color:#161618}

.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}

.day{
 background:white;
 border-radius:10px;
 padding:4px;
 min-height:80px;
 position:relative;
 display:flex;
 flex-direction:column;
 justify-content:space-between;
}

.date{font-weight:600}

/* 주말 색상 + 텍스트 */
.sun{background:#ffe5e5;color:#d00}
.sat{background:#e5f0ff;color:#0066ff}

/* 바 */
.bar{
 position:absolute;
 bottom:0;
 height:6px;
 background:#0a58dc;
}

.start{left:0;right:50%;border-radius:6px 0 0 6px}
.mid{left:0;right:0}
.end{left:50%;right:0;border-radius:0 6px 6px 0}
.single{left:0;right:0;border-radius:6px}

/* 반차 */
.half{
 height:6px;
 width:50%;
 background:#34c759;
 position:absolute;
 bottom:0;
 left:0;
 border-radius:6px;
}

.memo{font-size:10px;color:#555}
</style>
</head>

<body>

<h2 id="month"></h2>
<div id="calendar" class="calendar"></div>

<script>
const URL="./leave_data.json";
let cur=new Date();

async function load(){
 const res=await fetch(URL+"?v="+Date.now());
 const data=await res.json();
 updateSummary(data);
 render(data);
}

function updateSummary(data){
 let total=data.settings?.annual_total||0;
 let used=data.entries.reduce((s,e)=>s+e.days,0);
 let remain=total-used;

 document.getElementById("total").innerText=total;
 document.getElementById("used").innerText=used;
 document.getElementById("remain").innerText=remain;

 let box=document.getElementById("remainBox");
 box.className="sum-box";

 if(remain>=10) box.classList.add("green");
 else if(remain>=6) box.classList.add("yellow");
 else box.classList.add("red");
}

function render(data){
 const cal=document.getElementById("calendar");
 cal.innerHTML="";
 const entries=data.entries||[];

 let y=cur.getFullYear();
 let m=cur.getMonth();

 document.getElementById("month").innerText=y+"-"+(m+1);

 let first=new Date(y,m,1).getDay();
 let last=new Date(y,m+1,0).getDate();

 // 🔥 연속 휴가 처리
 let ranges=new Map();

 entries.forEach(e=>{
   let start=new Date(e.date);
   let days=Math.ceil(e.days||1);

   for(let i=0;i<days;i++){
     let d=new Date(start);
     d.setDate(start.getDate()+i);
     let key=d.toISOString().slice(0,10);
     ranges.set(key,e);
   }
 });

 for(let i=0;i<first;i++) cal.appendChild(document.createElement("div"));

 for(let d=1;d<=last;d++){
  let cell=document.createElement("div");
  cell.className="day";

  let weekday=new Date(y,m,d).getDay();
  if(weekday===0) cell.classList.add("sun");
  if(weekday===6) cell.classList.add("sat");

  let dateStr=y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");

  let entry=ranges.get(dateStr);

  cell.innerHTML=`<div class="date">${d}</div>`+(entry?`<div class="memo">${entry.memo||""}</div>`:"");

  // 🔥 반차만 따로 처리
  if(entry && entry.days===0.5){
    let half=document.createElement("div");
    half.className="half";
    cell.appendChild(half);
  }

  // 🔥 연차 (1 이상만 바 표시)
  if(entry && entry.days>=1){
    let bar=document.createElement("div");

    let prev=new Date(y,m,d-1).toISOString().slice(0,10);
    let next=new Date(y,m,d+1).toISOString().slice(0,10);

    if(ranges.has(prev)&&ranges.has(next)) bar.className="bar mid";
    else if(ranges.has(prev)) bar.className="bar end";
    else if(ranges.has(next)) bar.className="bar start";
    else bar.className="bar single";

    cell.appendChild(bar);
  }

  cal.appendChild(cell);
 }
}

function prev(){cur.setMonth(cur.getMonth()-1);load();}
function next(){cur.setMonth(cur.getMonth()+1);load();}

load();
</script>

</body>
</html>
