<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>연차 앱</title>

<link rel="manifest" href="manifest.webmanifest">

<style>
body {font-family:-apple-system; background:#f5f7fb; margin:0; padding:16px;}
h1 {font-size:22px;}
.calendar {display:grid; grid-template-columns:repeat(7,1fr); gap:6px;}
.day {background:white; padding:6px; border-radius:8px; min-height:60px; font-size:12px;}
.used {background:#d1f5d3;}
</style>
</head>

<body>

<h1>연차 캘린더</h1>

<div id="calendar" class="calendar"></div>

<script>
const DATA_URL="./leave_data.json";

async function load(){
 const res=await fetch(DATA_URL+"?v="+Date.now());
 const data=await res.json();
 render(data);
}

function render(data){
 const cal=document.getElementById("calendar");
 cal.innerHTML="";
 const entries=data.entries||[];

 for(let i=1;i<=30;i++){
   const d=document.createElement("div");
   d.className="day";
   d.innerHTML=i;

   const match=entries.find(e=>e.date.includes("-"+String(i).padStart(2,"0")));
   if(match){
     d.classList.add("used");
     d.innerHTML+= "<br>"+match.type;
   }

   cal.appendChild(d);
 }
}

load();
</script>

</body>
</html>
