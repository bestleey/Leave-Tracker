<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Leave Tracker</title>

<style>
body {
  background:#f2f2f7;
  font-family:-apple-system;
  text-align:center;
}

.header {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.7);
  padding:15px;
  border-radius:20px;
  margin:10px;
}

.calendar {
  display:grid;
  grid-template-columns: repeat(7,1fr);
  gap:8px;
  max-width:420px;
  margin:auto;
}

.cell {
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);
  border-radius:16px;
  height:70px;
  position:relative;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
  cursor:pointer;
}

.cell:active { transform:scale(0.96); }

.bar {
  position:absolute;
  bottom:8px;
  left:8px;
  right:8px;
  height:6px;
  border-radius:4px;
  transition:0.3s;
}

.full { background:#34C759; }
.half { background:#FF9F0A; width:50%; }

.sun { color:red; }
.sat { color:blue; }

</style>
</head>

<body>

<div class="header">
  <button onclick="prevMonth()">◀</button>
  <span id="title"></span>
  <button onclick="nextMonth()">▶</button>
  <div id="remain"></div>
</div>

<div class="calendar" id="calendar"></div>

<script>
const REPO = "bestleey/Leave-Tracker";
const PATH = "leave_data.json";

let entries = [];
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth()+1;

function toYMD(y,m,d){
  return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

/* 🔥 서버로 저장 (토큰 없음) */
async function saveToServer(data){
  await fetch("http://localhost:5000/save",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(data)
  });
}

/* 데이터 로드 */
async function loadData(){
  const res = await fetch(
    `https://raw.githubusercontent.com/${REPO}/main/${PATH}?v=`+Date.now()
  );
  const data = await res.json();

  entries = data.entries || [];

  calculateRemain();
  renderCalendar();
}

function calculateRemain(){
  let used = 0;
  entries.forEach(e=> used += Number(e.days||1));
  document.getElementById("remain").innerText = "남은 연차: " + (15-used);
}

function buildRanges(){
  const set = new Set();

  entries.forEach(e=>{
    let d = new Date(e.date);
    let count=0;
    let total=Math.ceil(e.days||1);

    while(count<total){
      let day=d.getDay();
      if(day!==0 && day!==6){
        set.add(d.toISOString().slice(0,10));
        count++;
      }
      d.setDate(d.getDate()+1);
    }
  });

  return set;
}

function renderCalendar(){
  const cal=document.getElementById("calendar");
  cal.innerHTML="";

  document.getElementById("title").innerText =
    currentYear+"년 "+currentMonth+"월";

  const last=new Date(currentYear,currentMonth,0).getDate();
  const ranges=buildRanges();

  for(let d=1; d<=last; d++){
    const cell=document.createElement("div");
    cell.className="cell";

    const wd=new Date(currentYear,currentMonth-1,d).getDay();
    if(wd===0) cell.classList.add("sun");
    if(wd===6) cell.classList.add("sat");

    const dateStr=toYMD(currentYear,currentMonth,d);
    const entry=entries.find(e=>e.date===dateStr);

    cell.innerHTML="<div>"+d+"</div>";

    if(ranges.has(dateStr)){
      const bar=document.createElement("div");
      bar.className="bar full";

      const prev=new Date(currentYear,currentMonth-1,d-1);
      const next=new Date(currentYear,currentMonth-1,d+1);

      const p=prev.toISOString().slice(0,10);
      const n=next.toISOString().slice(0,10);

      if(!ranges.has(p)) bar.style.borderRadius="6px 0 0 6px";
      if(!ranges.has(n)) bar.style.borderRadius="0 6px 6px 0";

      cell.appendChild(bar);
    }

    if(entry && entry.days==0.5){
      const bar=document.createElement("div");
      bar.className="bar half";
      cell.appendChild(bar);
    }

    cell.onclick=()=>addEntry(dateStr);

    cal.appendChild(cell);
  }
}

async function addEntry(date){
  const days=prompt("1=연차, 0.5=반차");
  if(!days) return;

  entries.push({ date:date, days:Number(days) });

  await saveToServer({ entries });

  loadData();
}

function prevMonth(){
  currentMonth--;
  if(currentMonth<1){ currentMonth=12; currentYear--; }
  renderCalendar();
}

function nextMonth(){
  currentMonth++;
  if(currentMonth>12){ currentMonth=1; currentYear++; }
  renderCalendar();
}

loadData();
</script>

</body>
</html>
